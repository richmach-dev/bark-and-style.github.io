<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1280"/>
<title>Bark & Style — 01 Login</title>
<link rel="stylesheet" href="shared.css"/>
<style>
body{display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 800px 600px at 20% 80%,rgba(42,158,143,.07) 0%,transparent 70%),radial-gradient(ellipse 600px 400px at 80% 20%,rgba(232,153,58,.06) 0%,transparent 60%);pointer-events:none;}
.auth-box{width:440px;position:relative;z-index:1;}
.auth-brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:24px;}
.auth-brand-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--teal),var(--teal-dark));display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 14px rgba(42,158,143,.3);}
.auth-brand-name{font-size:20px;font-weight:700;color:var(--charcoal);letter-spacing:-.3px;}
.auth-brand-name span{color:var(--teal);}
.auth-card{background:var(--surface);border-radius:var(--r-xl);box-shadow:0 2px 8px rgba(26,31,46,.06),0 16px 48px rgba(26,31,46,.10);padding:36px 40px;border:1px solid var(--border-light);}
.auth-tabs{display:flex;background:var(--bg);border-radius:var(--r);padding:4px;margin-bottom:28px;}
.auth-tab{flex:1;padding:9px 12px;border:none;background:transparent;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;color:var(--muted);}
.auth-tab.active{background:var(--surface);color:var(--charcoal);box-shadow:var(--shadow);}
.auth-form h2{font-family:'Lora',serif;font-size:24px;font-weight:600;margin-bottom:4px;color:var(--charcoal);letter-spacing:-.2px;}
.auth-form p.sub{color:var(--muted);font-size:13px;margin-bottom:24px;line-height:1.5;}
.btn-primary{width:100%;padding:13px;border:none;border-radius:var(--r);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;letter-spacing:.2px;margin-bottom:10px;}
.btn-customer{background:var(--teal);color:white;}
.btn-staff{background:var(--amber);color:white;}
.divider{text-align:center;margin:6px 0 16px;color:var(--muted);font-size:12px;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:44%;height:1px;background:var(--border);}
.divider::before{left:0;}.divider::after{right:0;}
.role-hint{font-size:12px;color:var(--muted);text-align:center;margin-top:14px;}
.role-hint a{color:var(--teal);font-weight:700;}
.footer-note{text-align:center;font-size:11px;color:var(--muted);margin-top:20px;font-weight:500;}
</style>
</head>
<body>
<div class="auth-box">
  <div class="auth-brand">
    <div class="auth-brand-icon">🐾</div>
    <div class="auth-brand-name">Bark <span>&amp;</span> Style</div>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active">Sign In</button>
      <button class="auth-tab">Create Account</button>
    </div>
    <div class="auth-form">
      <h2>Welcome back 👋</h2>
      <p class="sub">Sign in to manage your pet appointments.</p>
      <div class="form-group">
        <label>Email or Phone Number</label>
        <input type="text" placeholder="you@email.com or +63 9XX XXX XXXX"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="••••••••"/>
      </div>
      <button class="btn-primary btn-customer">Sign In as Customer</button>
      <div class="divider">or</div>
      <button class="btn-primary btn-staff">Sign In as Staff / Owner</button>
      <p class="role-hint">Don't have an account? <a>Create one free</a></p>
    </div>
  </div>
  <p class="footer-note">Bark &amp; Style Management System &nbsp;•&nbsp; STI College Ortigas-Cainta</p>
</div>
</body>
</html>
